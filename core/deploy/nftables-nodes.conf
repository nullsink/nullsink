#!/usr/sbin/nft -f
# nullsink NODE BOX firewall: default-deny inbound; allow SSH + WireGuard, and bitcoind RPC ONLY across the
# wg0 tunnel. bitcoind's outbound P2P (8333) + the WireGuard tunnel are allowed by the accept output policy.
# The RPC port (8332) is NEVER reachable from the clearnet — only from the app box over WireGuard. This is
# the node-box analogue of the app box's nftables.conf (which opens 80/443 for Caddy instead). Installed to
# /etc/nftables.conf and applied by nftables.service.
flush ruleset

table inet filter {
	chain input {
		type filter hook input priority filter; policy drop;

		ct state established,related accept
		ct state invalid drop
		iif "lo" accept

		# ICMP / ICMPv6 (ping + path-MTU discovery; IPv6 neighbor discovery is load-bearing).
		ip protocol icmp accept
		ip6 nexthdr icmpv6 accept

		tcp dport 22 accept            # SSH — change here if you moved sshd off 22
		udp dport 51820 accept         # WireGuard — the app box initiates the tunnel to this port

		# bitcoind RPC (mainnet 8332 / signet 38332 — a staging node runs signet) — reachable ONLY across the
		# WireGuard tunnel, never the clearnet. `iifname` (name,
		# runtime-matched) not `iif` (index, load-time): wg0 may not exist yet when this ruleset first loads,
		# and `iif` would make `nft -f` reject the whole file. Pin the single peer with `ip saddr <APP_WG_IP>`
		# in a drop-in to tighten further.
		iifname "wg0" tcp dport { 8332, 38332 } accept
	}

	chain forward {
		type filter hook forward priority filter; policy drop;
	}

	chain output {
		type filter hook output priority filter; policy accept;
	}
}
