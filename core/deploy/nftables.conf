#!/usr/sbin/nft -f
# nullsink edge firewall: default-deny inbound; allow only SSH + HTTP(S); allow all outbound.
# The app binds 127.0.0.1 (Caddy is the only inbound service besides SSH), and the crypto nodes work
# OUTBOUND-only behind this — bitcoind P2P, Tor, and the Monero remote node are all outbound, so no node
# ports are opened inbound. Installed to /etc/nftables.conf and applied by nftables.service.
flush ruleset

table inet filter {
	chain input {
		type filter hook input priority filter; policy drop;

		ct state established,related accept
		ct state invalid drop
		iif "lo" accept

		# ICMP / ICMPv6 (ping + path-MTU discovery; IPv6 neighbor discovery is load-bearing).
		ip protocol icmp accept
		ip6 nexthdr icmpv6 accept

		tcp dport 22 accept            # SSH — change here if you moved sshd off 22
		tcp dport { 80, 443 } accept   # Caddy edge (ACME + TLS)
	}

	chain forward {
		type filter hook forward priority filter; policy drop;
	}

	chain output {
		type filter hook output priority filter; policy accept;
	}
}
